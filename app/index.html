<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Legal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDEAE0;
    --ink: #1B2130;
    --brass: #AD8A3D;
    --maroon: #7A2331;
    --maroon-dark: #5E1B26;
    --slate: #5C6472;
    --line: rgba(27,33,48,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:70px 24px;
  }
  main{
    width:100%;
    max-width:720px;
  }
  h1{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:32px;
    margin:0 0 32px;
    text-align:center;
    color: var(--ink);
    border-bottom:2px solid var(--ink);
    padding-bottom:20px;
  }
  label.field-label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color: var(--slate);
    margin-bottom:10px;
  }
  textarea#question{
    width:100%;
    min-height:100px;
    resize:vertical;
    background: #FBFAF5;
    border:1px solid var(--line);
    border-left:3px solid var(--brass);
    border-radius:2px;
    padding:14px 16px;
    font-family:'Source Serif 4', serif;
    font-size:17px;
    color: var(--ink);
    line-height:1.5;
    outline:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  textarea#question:focus{
    border-color: var(--brass);
    box-shadow: 0 0 0 3px rgba(173,138,61,0.18);
  }

  .query-actions{
    display:flex;
    align-items:center;
    gap:16px;
    margin-top:14px;
  }
  button#ask{
    background: var(--maroon);
    color:#F4EFE3;
    border:none;
    padding:11px 26px;
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:.02em;
    border-radius:2px;
    cursor:pointer;
    transition: background .15s ease, transform .1s ease;
  }
  button#ask:hover{ background: var(--maroon-dark); }
  button#ask:active{ transform: translateY(1px); }
  button#ask:disabled{ background:#9C9686; cursor:default; }

  .status{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color: var(--slate);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .status .dot{
    width:6px;height:6px;border-radius:50%;
    background: var(--brass);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  @media (prefers-reduced-motion: reduce){ .status .dot{ animation:none; } }

  .opinion{
    display:none;
    margin-top:40px;
    animation: fadein .35s ease both;
  }
  .opinion.show{ display:block; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .answer-text{
    font-family:'Source Serif 4', serif;
    font-size:19px;
    line-height:1.65;
    color: var(--ink);
    margin:0 0 32px;
  }

  .warning-block{
    display:none;
    font-family:'Source Serif 4', serif;
    font-size:17px;
    line-height:1.6;
    color: var(--maroon-dark);
    background: rgba(122,35,49,0.06);
    border-left:3px solid var(--maroon);
    padding:16px 20px;
    margin-top:32px;
  }
  .warning-block.show{ display:block; }

  .citations{ display:flex; flex-direction:column; gap:2px; }
  .citation{
    position:relative;
    display:grid;
    grid-template-columns:64px 1fr auto;
    gap:18px;
    align-items:center;
    padding:16px 18px 16px 20px;
    background:#FBFAF5;
    border:1px solid var(--line);
    border-radius:2px;
  }
  .citation + .citation{ margin-top:-1px; }
  .citation .sec-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--brass);
    text-align:center;
  }
  .citation .act-name{
    font-family:'Source Serif 4', serif;
    font-weight:600;
    font-size:15.5px;
    color: var(--ink);
    margin:0 0 3px;
  }
  .citation .source-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color: var(--slate);
  }
  .citation .score{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--slate);
    text-align:right;
  }

  .error-block{
    display:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--maroon-dark);
    background: rgba(122,35,49,0.06);
    border-left:3px solid var(--maroon);
    padding:14px 18px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-top:24px;
  }
  .error-block.show{ display:block; }
</style>
</head>
<body>
<main>
  <h1>Indian Legal Assistant</h1>

  <label class="field-label" for="question">Question</label>
  <textarea id="question" placeholder="e.g. What is the punishment for hacking under the IT Act?"></textarea>

  <div class="query-actions">
    <button id="ask">File Query</button>
    <div class="status" id="status" style="display:none;">
      <span class="dot"></span>
      <span>Retrieving and generating…</span>
    </div>
  </div>

  <div class="error-block" id="error"></div>
  <div class="warning-block" id="warning"></div>

  <div class="opinion" id="opinion">
    <p class="answer-text" id="answer-text"></p>
    <div class="citations" id="citations"></div>
  </div>
</main>

<script>
  const API_URL = "http://localhost:8000";

  const questionEl = document.getElementById('question');
  const askBtn = document.getElementById('ask');
  const statusEl = document.getElementById('status');
  const opinionEl = document.getElementById('opinion');
  const answerTextEl = document.getElementById('answer-text');
  const citationsEl = document.getElementById('citations');
  const warningEl = document.getElementById('warning');
  const errorEl = document.getElementById('error');

  function resetPanels(){
    opinionEl.classList.remove('show');
    warningEl.classList.remove('show');
    errorEl.classList.remove('show');
    citationsEl.innerHTML = "";
  }

  function escapeHtml(str){
    return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
  }

  function renderCitations(citations){
    if(!citations || citations.length === 0) return;
    citations.forEach(c => {
      const score = typeof c.rerank_score === 'number' ? c.rerank_score.toFixed(3) : '—';
      const card = document.createElement('div');
      card.className = 'citation';
      card.innerHTML = `
        <div class="sec-no">§ ${escapeHtml(c.section_no || '—')}</div>
        <div>
          <div class="act-name">${escapeHtml(c.act_name || 'Unknown Act')}</div>
          <div class="source-line">${escapeHtml(c.source_file || '')} · p.${escapeHtml(String(c.page_num ?? '—'))}</div>
        </div>
        <div class="score">${score}</div>
      `;
      citationsEl.appendChild(card);
    });
  }

  async function submitQuery(){
    const q = questionEl.value.trim();
    if(!q) return;

    resetPanels();
    askBtn.disabled = true;
    statusEl.style.display = 'flex';

    try{
      const resp = await fetch(`${API_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      if(!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      const data = await resp.json();

      if(data.valid === false){
        warningEl.textContent = data.answer;
        warningEl.classList.add('show');
      } else {
        answerTextEl.textContent = data.answer;
        renderCitations(data.citations);
        opinionEl.classList.add('show');
      }
    } catch(err){
      errorEl.textContent = `Request failed — ${err.message}\n\nCheck that the FastAPI backend is running at ${API_URL} and CORS is enabled.`;
      errorEl.classList.add('show');
    } finally {
      askBtn.disabled = false;
      statusEl.style.display = 'none';
    }
  }

  askBtn.addEventListener('click', submitQuery);
  questionEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitQuery();
  });
</script>
</body>
</html>
